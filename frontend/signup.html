<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — AI Resume Analyzer</title>
    <meta name="description"
        content="Create your free AI Resume Analyzer account and start building a winning resume today." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="static/css/style.css" />
</head>

<body class="auth-body">

    <a href="index.html" class="back-home-btn">
        <i class="bi bi-arrow-left me-1"></i> Home
    </a>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-card-header text-center">
                <div class="auth-logo">
                    <i class="bi bi-file-earmark-person-fill"></i>
                </div>
                <h2>Create Account</h2>
                <p class="text-muted">Start your AI-powered resume journey today</p>
            </div>

            <div id="auth-alert" class="alert d-none" role="alert"></div>

            <form id="signup-form" novalidate>
                <div class="mb-3">
                    <label for="signup-name" class="form-label fw-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="signup-name" placeholder="John Doe" required />
                    </div>
                </div>
                <div class="mb-3">
                    <label for="signup-email" class="form-label fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="signup-email" placeholder="you@example.com"
                            required />
                    </div>
                </div>
                <div class="mb-3">
                    <label for="signup-password" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="signup-password" placeholder="Min 6 characters"
                            required minlength="6" />
                        <button class="btn btn-outline-secondary" type="button" id="toggle-pwd">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="signup-confirm-password" class="form-label fw-semibold">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="signup-confirm-password"
                            placeholder="Re-enter your password" required />
                    </div>
                </div>

                <!-- Password strength indicator -->
                <div class="password-strength mb-3">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strength-fill"></div>
                    </div>
                    <small class="strength-label" id="strength-label">Strength</small>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-auth" id="signup-btn">
                    <span id="signup-btn-text"><i class="bi bi-person-plus me-2"></i>Create Account</span>
                    <span id="signup-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>

            <div class="auth-divider"><span>or</span></div>

            <button class="btn btn-google w-100" id="google-signup-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" />
                Sign Up with Google
            </button>

            <p class="text-center mt-4 mb-0 small">
                Already have an account? <a href="login.html" class="text-primary fw-semibold">Sign In</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="static/js/firebase_config.js"></script>
    <script type="module" src="static/js/auth.js"></script>
</body>

</html>
