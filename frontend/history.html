<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History — AI Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="static/css/style.css" />
</head>

<body class="app-body">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand"><i class="bi bi-file-earmark-person-fill"></i><span>ResumeAI</span></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><i class="bi bi-grid"></i> Dashboard</a>
            <a href="create_resume.html" class="sidebar-link"><i class="bi bi-file-earmark-plus"></i> Create Resume</a>
            <a href="analyze.html" class="sidebar-link"><i class="bi bi-search"></i> Analyze Resume</a>
            <a href="history.html" class="sidebar-link active"><i class="bi bi-clock-history"></i> History</a>
            <a href="profile.html" class="sidebar-link"><i class="bi bi-person-circle"></i> Profile</a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn btn-sm btn-outline-danger w-100" id="logout-btn"><i
                    class="bi bi-box-arrow-left me-1"></i> Logout</button>
        </div>
    </aside>

    <main class="app-main">
        <div class="app-topbar">
            <button class="btn btn-sm btn-link sidebar-toggle" id="sidebar-toggle"><i
                    class="bi bi-list fs-4"></i></button>
            <div class="topbar-greeting"><span>Resume History</span></div>
            <div class="topbar-right">
                <a href="profile.html"><img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff"
                        alt="Avatar" id="topbar-avatar" width="36" height="36" style="border-radius:50%;" /></a>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs history-tabs mb-4" id="historyTabs">
            <li class="nav-item">
                <button class="nav-link active" id="created-tab" data-bs-toggle="tab" data-bs-target="#created-panel">
                    <i class="bi bi-file-earmark-text me-2"></i>Created Resumes
                    <span class="badge bg-primary ms-2" id="created-count">0</span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="analyzed-tab" data-bs-toggle="tab" data-bs-target="#analyzed-panel">
                    <i class="bi bi-graph-up me-2"></i>Analysis Reports
                    <span class="badge bg-info ms-2" id="analyzed-count">0</span>
                </button>
            </li>
        </ul>

        <!-- Loading Spinner -->
        <div id="history-loading" class="text-center py-5">
            <div class="loading-spinner mb-3">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <p class="text-muted">Loading your history...</p>
        </div>

        <!-- Tab Content -->
        <div class="tab-content" id="historyTabContent">
            <!-- Created -->
            <div class="tab-pane fade show active" id="created-panel">
                <div id="created-list" class="d-none">
                    <div class="row g-3" id="created-cards"></div>
                </div>
                <div id="created-empty" class="text-center py-5 d-none">
                    <i class="bi bi-file-earmark-plus fs-1 text-muted d-block mb-3"></i>
                    <h6 class="text-muted">No resumes created yet.</h6>
                    <a href="create_resume.html" class="btn btn-primary mt-2">Create Your First Resume</a>
                </div>
            </div>

            <!-- Analyzed -->
            <div class="tab-pane fade" id="analyzed-panel">
                <div id="analyzed-list" class="d-none">
                    <div class="accordion" id="analyzed-accordion"></div>
                </div>
                <div id="analyzed-empty" class="text-center py-5 d-none">
                    <i class="bi bi-search fs-1 text-muted d-block mb-3"></i>
                    <h6 class="text-muted">No resumes analyzed yet.</h6>
                    <a href="analyze.html" class="btn btn-info text-white mt-2">Analyze a Resume</a>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="static/js/firebase_config.js"></script>
    <script type="module" src="static/js/auth.js"></script>
    <script type="module" src="static/js/history.js"></script>
</body>

</html>
