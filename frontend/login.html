<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — AI Resume Analyzer</title>
    <meta name="description" content="Login to AI Resume Analyzer to build and analyze your resume." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="static/css/style.css" />
</head>

<body class="auth-body">

    <!-- Back to Home -->
    <a href="index.html" class="back-home-btn">
        <i class="bi bi-arrow-left me-1"></i> Home
    </a>

    <div class="auth-container">
        <!-- Auth Card -->
        <div class="auth-card">
            <div class="auth-card-header text-center">
                <div class="auth-logo">
                    <i class="bi bi-file-earmark-person-fill"></i>
                </div>
                <h2>Welcome Back</h2>
                <p class="text-muted">Sign in to your AI Resume Analyzer account</p>
            </div>

            <!-- Alert Box -->
            <div id="auth-alert" class="alert d-none" role="alert"></div>

            <!-- Login Form -->
            <form id="login-form" novalidate>
                <div class="mb-3">
                    <label for="login-email" class="form-label fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="login-email" placeholder="you@example.com"
                            required />
                    </div>
                </div>
                <div class="mb-3">
                    <label for="login-password" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="login-password" placeholder="••••••••"
                            required />
                        <button class="btn btn-outline-secondary" type="button" id="toggle-pwd">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-4 text-end">
                    <a href="#" class="text-primary small" id="forgot-pwd-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-auth" id="login-btn">
                    <span id="login-btn-text"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
                    <span id="login-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider"><span>or</span></div>

            <!-- Google Sign In -->
            <button class="btn btn-google w-100" id="google-login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" />
                Continue with Google
            </button>

            <!-- Signup Link -->
            <p class="text-center mt-4 mb-0 small">
                Don't have an account? <a href="signup.html" class="text-primary fw-semibold">Sign Up Free</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="static/js/firebase_config.js"></script>
    <script type="module" src="static/js/auth.js"></script>
</body>

</html>
