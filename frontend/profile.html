<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile — AI Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="static/css/style.css" />
</head>

<body class="app-body">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand"><i class="bi bi-file-earmark-person-fill"></i><span>ResumeAI</span></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><i class="bi bi-grid"></i> Dashboard</a>
            <a href="create_resume.html" class="sidebar-link"><i class="bi bi-file-earmark-plus"></i> Create Resume</a>
            <a href="analyze.html" class="sidebar-link"><i class="bi bi-search"></i> Analyze Resume</a>
            <a href="history.html" class="sidebar-link"><i class="bi bi-clock-history"></i> History</a>
            <a href="profile.html" class="sidebar-link active"><i class="bi bi-person-circle"></i> Profile</a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn btn-sm btn-outline-danger w-100" id="logout-btn"><i
                    class="bi bi-box-arrow-left me-1"></i> Logout</button>
        </div>
    </aside>

    <main class="app-main">
        <div class="app-topbar">
            <button class="btn btn-sm btn-link sidebar-toggle" id="sidebar-toggle"><i
                    class="bi bi-list fs-4"></i></button>
            <div class="topbar-greeting"><span>My Profile</span></div>
            <div class="topbar-right">
                <a href="profile.html"><img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff"
                        alt="Avatar" id="topbar-avatar" width="36" height="36" style="border-radius:50%;" /></a>
            </div>
        </div>

        <div class="row g-4">
            <!-- Profile Card -->
            <div class="col-lg-4">
                <div class="glass-card p-4 text-center h-100">
                    <div class="profile-avatar-wrap mb-3">
                        <img id="profile-photo"
                            src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff&size=128"
                            alt="Profile Photo" class="profile-avatar" />
                        <label class="profile-avatar-edit" for="photo-upload" title="Change photo">
                            <i class="bi bi-camera-fill"></i>
                        </label>
                        <input type="file" id="photo-upload" accept="image/*" class="d-none" />
                    </div>
                    <h4 class="fw-bold mb-1" id="profile-name">Loading...</h4>
                    <p class="text-muted mb-1" id="profile-email">–</p>
                    <p class="text-muted small" id="profile-joined">Joined: –</p>

                    <!-- Stats -->
                    <div class="profile-stats-row mt-4">
                        <div class="profile-stat">
                            <div class="profile-stat-num" id="ps-created">–</div>
                            <div class="profile-stat-label">Created</div>
                        </div>
                        <div class="profile-stat-divider"></div>
                        <div class="profile-stat">
                            <div class="profile-stat-num" id="ps-analyzed">–</div>
                            <div class="profile-stat-label">Analyzed</div>
                        </div>
                    </div>

                    <button class="btn btn-outline-danger mt-4 w-100" id="logout-btn-profile">
                        <i class="bi bi-box-arrow-left me-2"></i>Logout
                    </button>
                </div>
            </div>

            <!-- Edit Profile -->
            <div class="col-lg-8">
                <div class="glass-card p-4 mb-4">
                    <h5 class="fw-bold mb-4"><i class="bi bi-pencil-square me-2 text-primary"></i>Edit Profile</h5>
                    <div id="profile-alert" class="alert d-none" role="alert"></div>
                    <form id="edit-profile-form">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="edit-name" class="form-label fw-semibold">Full Name</label>
                                <input type="text" class="form-control" id="edit-name" placeholder="Your Full Name" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" id="edit-email" readonly disabled />
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary px-4" id="save-profile-btn">
                                    <i class="bi bi-check-lg me-1"></i>Save Changes
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Change Password -->
                <div class="glass-card p-4">
                    <h5 class="fw-bold mb-4"><i class="bi bi-shield-lock me-2 text-primary"></i>Change Password</h5>
                    <div id="pwd-alert" class="alert d-none" role="alert"></div>
                    <form id="change-pwd-form">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="new-password" class="form-label fw-semibold">New Password</label>
                                <input type="password" class="form-control" id="new-password"
                                    placeholder="Min 6 characters" />
                            </div>
                            <div class="col-md-6">
                                <label for="confirm-new-password" class="form-label fw-semibold">Confirm
                                    Password</label>
                                <input type="password" class="form-control" id="confirm-new-password"
                                    placeholder="Re-enter" />
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-warning px-4" id="change-pwd-btn">
                                    <i class="bi bi-key me-1"></i>Update Password
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="static/js/firebase_config.js"></script>
    <script type="module" src="static/js/auth.js"></script>
    <script type="module" src="static/js/profile.js"></script>
</body>

</html>
